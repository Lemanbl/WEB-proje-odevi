<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top custom-navbar">
    <div class="container-fluid">
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav w-100 justify-content-between text-center">
                <li class="nav-item"><a class="nav-link" href="index.html">Hakkında</a></li>
                <li class="nav-item"><a class="nav-link" href="ozgecmis.html">Özgeçmiş</a></li>
                <li class="nav-item"><a class="nav-link" href="sehrim.html">Şehrim</a></li>
                <li class="nav-item"><a class="nav-link" href="mirasimiz.html">Mirasımız</a></li>
                <li class="nav-item"><a class="nav-link" href="ilgialanlarim.html">İlgi Alanlarım</a></li>
                <li class="nav-item"><a class="nav-link" href="iletisim.html">İletişim</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="contact-page" id="app">
    <section class="contact-card">
        <div class="baslik">
            
        <h1>İletişim Formu</h1>
        <p class="contact-desc">Benimle iletişime geçmek için aşağıdaki formu doldurabilirsiniz.</p>

        </div>
        <form action="sonuc.php" method="POST" onsubmit="return submitControl()">

            <div class="form-grid">
                <div class="form-box">
                    <label>Ad Soyad</label>
                    <input type="text" name="name" v-model="name" placeholder="Adınızı giriniz">
                    <small id="errName"></small>
                </div>

                <div class="form-box">
                    <label>Email</label>
                    <input type="text" name="email" v-model="email" placeholder="ornek@mail.com">
                    <small id="errEmail"></small>
                </div>

                <div class="form-box">
                    <label>Telefon</label>
                    <input type="text" name="telefon" v-model="telefon" placeholder="05551234567">
                    <small id="errTelefon"></small>
                </div>

                <div class="form-box">
                    <label>Şifre</label>
                    <input type="password" name="password" v-model="password" placeholder="Şifre giriniz">
                    <small id="errPassword"></small>
                </div>

                <div class="form-box">
                    <label>Doğum Tarihi</label>
                    <input type="date" name="date" v-model="date">
                    <small id="errDate"></small>
                </div>

                <div class="form-box">
                    <label>Şehir</label>
                    <select name="city" v-model="city">
                        <option value="">Şehir seçiniz</option>
                        <option>Adana</option>
                        <option>Ankara</option>
                        <option>Antalya</option>
                        <option>Bursa</option>
                        <option>İstanbul</option>
                        <option>İzmir</option>
                        <option>Kocaeli</option>
                        <option>Sakarya</option>
                    </select>
                    <small id="errCity"></small>
                </div>
            </div>

            <div class="form-box">
                <label>Cinsiyet</label>
                <div class="option-row">
                    <label><input type="radio" name="gender" value="Kadın" v-model="gender"> Kadın</label>
                    <label><input type="radio" name="gender" value="Erkek" v-model="gender"> Erkek</label>
                </div>
                <small id="errGender"></small>
            </div>

            <div class="form-box">
                <label>İlgi Alanları</label>
                <div class="option-row">
                    <label><input type="checkbox" name="interests[]" value="Yazılım" v-model="interests"> Yazılım</label>
                    <label><input type="checkbox" name="interests[]" value="Tasarım" v-model="interests"> Tasarım</label>
                    <label><input type="checkbox" name="interests[]" value="Yapay Zeka" v-model="interests"> Yapay Zeka</label>
                    <label><input type="checkbox" name="interests[]" value="Spor" v-model="interests"> Spor</label>
                </div>
                <small id="errInterests"></small>
            </div>

            <div class="form-grid">
                <div class="form-box">
                    <label>Favori Renk</label>
                    <input type="color" name="renk" v-model="renk">
                </div>

                <div class="form-box">
                    <label>Memnuniyet: {{ memnuniyet }}</label>
                    <input type="range" name="memnuniyet" min="1" max="10" v-model="memnuniyet">
                </div>
            </div>

            <div class="form-box">
                <label>Mesaj</label>
                <textarea name="mesaj" v-model="mesaj" placeholder="Mesajınızı yazınız"></textarea>
                <small id="errMesaj"></small>
            </div>

            <div class="form-box">
                <label>Dosya Yükle</label>
                <input type="file" name="dosya">
            </div>

            <div class="form-box">
                <label class="accept">
                    <input type="checkbox" name="onay" value="Kabul edildi" v-model="onay">
                    Form bilgilerimin gönderilmesini kabul ediyorum.
                </label>
                <small id="errOnay"></small>
            </div>

            <div class="button-area">
                <button type="button" onclick="validateJS()" class="control-btn">JavaScript ile Kontrol</button>
                <button type="button" @click="validateVue" class="control-btn">Vue ile Kontrol</button>
                <button type="submit" class="send-btn">Gönder</button>
            </div>

            <p id="jsMessage" class="form-message"></p>
            <p class="form-message">{{ vueMessage }}</p>

        </form>
    </section>
</main>

<script src="https://unpkg.com/vue@3"></script>

<script>
function clearMessages() {
    document.querySelectorAll("small").forEach(item => item.innerText = "");
    document.getElementById("jsMessage").innerText = "";
}

function formCheck(data) {
    const emailPattern = /^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/;
    const phonePattern = /^[0-9]+$/;

    if (data.name.trim() === "") return ["errName", "Ad Soyad boş bırakılamaz."];
    if (!emailPattern.test(data.email)) return ["errEmail", "Geçerli bir email adresi giriniz."];
    if (data.telefon.trim() === "" || !phonePattern.test(data.telefon)) return ["errTelefon", "Telefon sadece rakamlardan oluşmalıdır."];
    if (data.password.trim() === "") return ["errPassword", "Şifre boş bırakılamaz."];
    if (data.date === "") return ["errDate", "Lütfen tarih seçiniz."];
    if (data.city === "") return ["errCity", "Lütfen şehir seçiniz."];
    if (data.gender === "") return ["errGender", "Lütfen cinsiyet seçiniz."];
    if (data.interests.length === 0) return ["errInterests", "En az bir ilgi alanı seçiniz."];
    if (data.mesaj.trim() === "") return ["errMesaj", "Mesaj boş bırakılamaz."];
    if (!data.onay) return ["errOnay", "Onay kutusunu işaretlemelisiniz."];

    return ["success", "Form başarıyla kontrol edildi ✔"];
}

function validateJS() {
    clearMessages();

    const data = {
        name: document.querySelector('[name="name"]').value,
        email: document.querySelector('[name="email"]').value,
        telefon: document.querySelector('[name="telefon"]').value,
        password: document.querySelector('[name="password"]').value,
        date: document.querySelector('[name="date"]').value,
        city: document.querySelector('[name="city"]').value,
        gender: document.querySelector('[name="gender"]:checked')?.value || "",
        interests: Array.from(document.querySelectorAll('[name="interests[]"]:checked')),
        mesaj: document.querySelector('[name="mesaj"]').value,
        onay: document.querySelector('[name="onay"]').checked
    };

    const result = formCheck(data);

    if (result[0] === "success") {
        document.getElementById("jsMessage").innerText = "JavaScript kontrolü başarılı ✔ Form gönderilebilir.";
        document.getElementById("jsMessage").style.color = "green";
        return true;
    } else {
        document.getElementById(result[0]).innerText = result[1];
        document.getElementById("jsMessage").innerText = "Lütfen hatalı alanları düzeltiniz.";
        document.getElementById("jsMessage").style.color = "red";
        return false;
    }
}

function submitControl() {
    return validateJS();
}

Vue.createApp({
    data() {
        return {
            name: "",
            email: "",
            telefon: "",
            password: "",
            date: "",
            city: "",
            gender: "",
            interests: [],
            renk: "#374651",
            memnuniyet: 5,
            mesaj: "",
            onay: false,
            vueMessage: ""
        }
    },
    methods: {
        validateVue() {
            const result = formCheck(this);

            if (result[0] === "success") {
                this.vueMessage = "Vue kontrolü başarılı ✔ Form gönderilebilir.";
            } else {
                this.vueMessage = result[1];
            }
        }
    }
}).mount("#app");
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
