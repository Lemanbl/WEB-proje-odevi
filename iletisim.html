<section class="iletisim-page">

    <h3>İletişim için formu doldurunuz</h3>

    <form id="app" method="POST" action="sonuc.php" onsubmit="return validateJS()">

        <input type="text" v-model="name" name="name" placeholder="Ad Soyad">

        <input type="email" v-model="email" name="email" placeholder="Email">

        <input type="text" v-model="phone" name="telefon" placeholder="Telefon">

        <input type="password" name="password" placeholder="Şifre">

        <input type="date" name="date">

        <label><b>Favori Renk:</b></label>
        <input type="color" name="renk">

        <label><b>Memnuniyet:</b></label>
        <input type="range" name="memnuniyet" min="0" max="10">

        <p><b>Cinsiyet:</b></p>
        <label>
            <input type="radio" name="gender" value="Erkek" v-model="gender"> Erkek
        </label>
        <label>
            <input type="radio" name="gender" value="Kadın" v-model="gender"> Kadın
        </label>

        <p><b>İlgi Alanları:</b></p>
        <label>
            <input type="checkbox" name="interests[]" value="Yazılım" v-model="interests"> Yazılım
        </label>
        <label>
            <input type="checkbox" name="interests[]" value="Tasarım" v-model="interests"> Tasarım
        </label>
        <label>
            <input type="checkbox" name="interests[]" value="Yapay Zeka" v-model="interests"> Yapay Zeka
        </label>

        <select name="city" v-model="city">
            <option value="">Şehir seç</option>
            <option>İstanbul</option>
            <option>Sakarya</option>
            <option>Kocaeli</option>
            <option>İzmir</option>
            <option>Ankara</option>
        </select>

        <textarea v-model="messageText" name="mesaj" placeholder="Mesaj"></textarea>

        <input type="file" name="dosya">

        <label>
            <input type="checkbox" name="onay" value="Kabul edildi" v-model="check">
            Şartları kabul ediyorum
        </label>

        <br><br>

        <button type="button" onclick="validateJS()">JS ile kontrol</button>
        <button type="button" @click="validateVue">Vue ile kontrol</button>

        <br>

        <input type="submit" value="Gönder" class="Gonder">
    </form>

    <p id="error"></p>

</section>

<script>
function validateJS() {

    let name = document.querySelector('input[name="name"]').value;
    let email = document.querySelector('input[name="email"]').value;
    let phone = document.querySelector('input[name="telefon"]').value;
    let city = document.querySelector('select[name="city"]').value;
    let message = document.querySelector('textarea[name="mesaj"]').value;
    let onay = document.querySelector('input[name="onay"]').checked;

    if (name.trim() === "") {
        alert("Ad boş olamaz");
        return false;
    }
    if (!email.includes("@")) {
        alert("Email yanlış");
        return false;
    }
    if (phone.trim() === "" || isNaN(phone)) {
        alert("Telefon sadece rakam olmalı");
        return false;
    }
    if (city === "") {
        alert("Şehir seçiniz");
        return false;
    }
    if (message.trim() === "") {
        alert("Mesaj boş olamaz");
        return false;
    }
    if (!onay) {
        alert("Şartları kabul edin");
        return false;
    }

    return true;
}
</script>

<script src="https://unpkg.com/vue@3"></script>

<script>
const app = Vue.createApp({
    data() {
        return {
            name: "",
            email: "",
            phone: "",
            gender: "",
            interests: [],
            city: "",
            messageText: "",
            check: false,
            message: ""
        }
    },
    methods: {
        validateVue() {
            if (this.name.trim() === "") {
                this.message = "Ad Soyad boş olamaz";
            }
            else if (this.email.trim() === "" || !this.email.includes("@")) {
                this.message = "Email formatı yanlış";
            }
            else if (this.phone.trim() === "" || isNaN(this.phone)) {
                this.message = "Telefon sadece rakamlardan oluşmalıdır";
            }
            else if (this.gender === "") {
                this.message = "Cinsiyet seçilmelidir";
            }
            else if (this.interests.length === 0) {
                this.message = "En az bir ilgi alanı seçilmelidir";
            }
            else if (this.city === "") {
                this.message = "Şehir seçilmelidir";
            }
            else if (this.messageText.trim() === "") {
                this.message = "Mesaj boş olamaz";
            }
            else if (!this.check) {
                this.message = "Şartları kabul etmelisiniz";
            }
            else {
                this.message = "Vue kontrol başarılı ✔";
            }
        }
    }
});

app.mount("#app");
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
